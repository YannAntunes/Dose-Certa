services:
  - type: web
    name: dose-certa-api
    env: docker
    rootDir: "Dose Certa Spring"
    plan: free
    healthCheckPath: /
    envVars:
      - key: PGHOST
        fromDatabase:
          name: dose-certa-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: dose-certa-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: dose-certa-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dose-certa-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dose-certa-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: dose-certa-db
    plan: free
