# ===============================
# BANCO DE DADOS - POSTGRES
# ===============================

spring.datasource.url=${DB_URL:jdbc:h2:mem:dosecerta}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.database-platform=${JPA_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# TIMEZONE
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# SERVER
# ===============================

server.port=8080
logging.level.org.springframework.web=DEBUG

# ===============================
# SWAGGER / OPENAPI
# ===============================

springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# ===============================
# JWT (NO SUBIR SEGREDO REAL)
# ===============================
jwt.secret=uma-chave-muito-grande-com-mais-de-32-caracteres-123456
jwt.expiration=86400000
